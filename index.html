<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Good Morning Nairobi</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, #fff1f5, #ffe4ec, #fff9fb);
      font-family: "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 30px;
      max-width: 500px;
    }

    .sun {
      width: 90px;
      height: 90px;
      margin: 0 auto 25px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd166, #ff9f1c);
      box-shadow: 0 0 40px rgba(255, 200, 100, 0.6);
      animation: rise 3s ease-in-out infinite alternate;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      color: #ff4d6d;
    }

    .text {
      margin-top: 15px;
      font-size: 1.1rem;
      color: #444;
      line-height: 1.6;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 1s;
    }

    .heart {
      font-size: 28px;
      margin-top: 20px;
      animation: beat 1.2s infinite;
    }

    @keyframes rise {
      from { transform: translateY(10px); }
      to { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes beat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="sun"></div>

    <h1>Good morning, Nairobi ☀️</h1>

    <div class="text">
      I hope today is gentle with you…<br><br>
      May everything go your way,<br>
      and even the small moments make you smile.<br><br>
      Just know… you were on my mind this morning.
    </div>

    <div class="heart">❤️</div>
  </div>
</body>
</html>
